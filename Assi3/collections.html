<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collections | Apna Cart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-white white-page-nav">

    <nav class="navbar navbar-expand-lg fixed-top shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="index.html">APNA<span>CART</span></a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mx-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link active-page" href="collections.html">Collections</a></li>
                    <li class="nav-item"><a class="nav-link" href="shop.html">Shop</a></li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" id="login-link" data-bs-toggle="modal" data-bs-target="#loginModal">Login</a>
                    </li>
                </ul>
                <button class="btn btn-outline-dark rounded-pill px-4" id="cartBtn">
                    BAG (<span id="cart-count">0</span>)
                </button>
            </div>
        </div>
    </nav>

    <header class="py-5 mt-5">
        <div class="container pt-5 text-center">
            <h6 class="text-uppercase ls-2 text-muted mb-2">Our Edit</h6>
            <h1 class="display-3 fw-bold mb-4">The Collections.</h1>
        </div>
    </header>

    <section class="container pb-5">
        <div class="row g-4">
            <div class="col-lg-8">
                <div class="collection-item large-box">
                    <img src="https://images.unsplash.com/photo-1558769132-cb1aea458c5e?w=1200" alt="Men">
                    <div class="item-overlay p-5">
                        <h2 class="display-5 fw-bold">Street Wear.</h2>
                        <a href="shop.html?category=men" class="btn btn-link text-white ps-0 fw-bold text-decoration-none mt-3">SHOP COLLECTION →</a>
                    </div>
                </div>
            </div>

            <div class="col-lg-4">
                <div class="collection-item small-box bg-light-grey">
                    <img src="https://images.unsplash.com/photo-1549298916-b41d501d3772?w=600" alt="Shoes">
                    <div class="item-overlay p-4">
                        <h3 class="fw-bold text-dark">Basic Shoes.</h3>
                        <a href="shop.html?category=accessories" class="text-dark small fw-bold text-decoration-none">SHOP NOW</a>
                    </div>
                </div>
            </div>

            <div class="col-lg-12">
                <div class="collection-item mid-box">
                    <img src="https://images.unsplash.com/photo-1490481651871-ab68de25d43d?w=1200" alt="Women">
                    <div class="item-overlay p-5">
                        <h2 class="display-6 fw-bold">Women's Selection.</h2>
                        <a href="shop.html?category=women" class="btn btn-outline-light rounded-0 px-4 mt-2">EXPLORE NOW</a>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer bg-dark text-white py-5">
        <div class="container text-center">
            <h3 class="navbar-brand text-white footer-logo">APNA<span>CART</span></h3>
            <p class="text-secondary">Premium quality fabrics, tailored for the modern Indian lifestyle.</p>
            <div class="d-flex justify-content-center gap-3 fs-4 mt-3">
                <i class="fab fa-instagram"></i>
                <i class="fab fa-facebook"></i>
            </div>
        </div>
    </footer>

    <div id="cartSidebar" class="cart-sidebar">
        <div class="cart-header p-3 border-bottom d-flex justify-content-between align-items-center">
            <h5 class="mb-0 fw-bold">Shopping Bag</h5>
            <button id="closeCart" class="btn-close"></button>
        </div>
        <div id="cartItemsList" class="p-3 cart-body"></div>
        <div class="cart-footer p-3 border-top">
            <div class="d-flex justify-content-between mb-3">
                <span class="fw-bold">Total:</span>
                <span id="cartTotal" class="fw-bold text-success">₹0</span>
            </div>
            <button class="btn btn-dark w-100 rounded-0 py-2">CHECKOUT</button>
        </div>
    </div>
    <div id="cartOverlay" class="cart-overlay"></div>

    <div class="modal fade" id="loginModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content rounded-0 border-0 shadow">
                <div class="modal-body p-5">
                    <h3 class="fw-bold mb-4 text-center">Login to <span class="text-danger">APNACART</span></h3>
                    <form onsubmit="event.preventDefault(); handleLogin(document.getElementById('lEmail').value, document.getElementById('lPass').value);">
                        <div class="mb-3">
                            <label class="small fw-bold">Email</label>
                            <input type="email" id="lEmail" class="form-control rounded-0" placeholder="Enter Email" required>
                        </div>
                        <div class="mb-4">
                            <label class="small fw-bold">Password</label>
                            <input type="password" id="lPass" class="form-control rounded-0" placeholder="Enter Password" required>
                        </div>
                        <button type="submit" class="btn btn-dark w-100 rounded-0 py-2">SIGN IN</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
